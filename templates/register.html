{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body">
        <h3 class="text-center mb-4">Criar Conta</h3>
        <form method="POST">
          <div class="mb-3"><label>Usuário</label><input type="text" name="username" class="form-control" required></div>
          <div class="mb-3"><label>Senha</label><input type="password" name="password" class="form-control" required></div>
          <div class="mb-3"><label>Tipo</label>
            <select name="role" class="form-control">
              <option value="patient">Paciente</option>
              <option value="doctor">Médico</option>
            </select>
          </div>
          <button class="btn btn-success w-100">Registrar</button>
        </form>
        <div class="text-center mt-3"><a href="{{ url_for('login') }}">Já tem conta? Faça login</a></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
